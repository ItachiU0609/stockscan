<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="StockScan"/>
<title>StockScan — Penny Stock Screener</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow:wght@300;400;600;700&family=Barlow+Condensed:wght@700;900&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #080c10; --surface: #0d1520; --surface2: #111d2e;
    --border: rgba(0,200,120,0.15); --green: #00e676; --green-dim: #00c853;
    --red: #ff3d57; --yellow: #ffca28; --cyan: #00e5ff;
    --text: #cdd9e5; --text-dim: #5a7a8a;
    --mono: 'Share Tech Mono', monospace; --sans: 'Barlow', sans-serif;
    --cond: 'Barlow Condensed', sans-serif;
    --safe-top: env(safe-area-inset-top, 0px); --safe-bot: env(safe-area-inset-bottom, 0px);
  }
  html, body { min-height: 100dvh; background: var(--bg); color: var(--text); font-family: var(--sans); font-size: 15px; -webkit-font-smoothing: antialiased; overflow-x: hidden; }
  body::before { content: ''; position: fixed; inset: 0; background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.07) 2px, rgba(0,0,0,0.07) 4px); pointer-events: none; z-index: 9999; }
  body::after { content: ''; position: fixed; inset: 0; background-image: linear-gradient(rgba(0,200,120,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(0,200,120,0.03) 1px, transparent 1px); background-size: 32px 32px; pointer-events: none; z-index: 0; }
  .app { position: relative; z-index: 1; max-width: 480px; margin: 0 auto; padding: calc(var(--safe-top) + 16px) 16px calc(var(--safe-bot) + 24px); min-height: 100dvh; display: flex; flex-direction: column; gap: 16px; }
  .header { display: flex; align-items: flex-end; justify-content: space-between; padding: 8px 0 4px; }
  .logo { font-family: var(--cond); font-size: 32px; font-weight: 900; letter-spacing: 2px; color: var(--green); text-shadow: 0 0 20px rgba(0,230,118,0.4); line-height: 1; }
  .logo span { color: var(--cyan); }
  .tagline { font-family: var(--mono); font-size: 10px; color: var(--text-dim); letter-spacing: 1px; text-transform: uppercase; }
  .search-wrap { display: flex; gap: 8px; align-items: center; }
  .ticker-input { flex: 1; background: var(--surface); border: 1.5px solid var(--border); border-radius: 8px; padding: 14px 16px; font-family: var(--mono); font-size: 20px; letter-spacing: 3px; color: var(--green); text-transform: uppercase; outline: none; transition: border-color 0.2s, box-shadow 0.2s; caret-color: var(--green); }
  .ticker-input::placeholder { color: var(--text-dim); letter-spacing: 2px; font-size: 14px; }
  .ticker-input:focus { border-color: var(--green); box-shadow: 0 0 0 3px rgba(0,230,118,0.12); }
  .scan-btn { background: var(--green); color: #000; border: none; border-radius: 8px; padding: 14px 20px; font-family: var(--cond); font-weight: 700; font-size: 16px; letter-spacing: 1px; cursor: pointer; transition: transform 0.1s; white-space: nowrap; -webkit-tap-highlight-color: transparent; }
  .scan-btn:active { transform: scale(0.96); }
  .scan-btn:disabled { background: #1a2a1a; color: var(--text-dim); cursor: not-allowed; }
  .loading { display: none; flex-direction: column; align-items: center; gap: 12px; padding: 40px 0; }
  .loading.active { display: flex; }
  .spinner { width: 40px; height: 40px; border: 2px solid var(--border); border-top-color: var(--green); border-radius: 50%; animation: spin 0.7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { font-family: var(--mono); font-size: 12px; color: var(--text-dim); letter-spacing: 2px; animation: pulse 1.4s ease-in-out infinite; }
  @keyframes pulse { 0%,100% { opacity: 0.4; } 50% { opacity: 1; } }
  .error-box { display: none; background: rgba(255,61,87,0.08); border: 1px solid rgba(255,61,87,0.3); border-radius: 8px; padding: 14px 16px; font-family: var(--mono); font-size: 13px; color: var(--red); line-height: 1.6; }
  .error-box.active { display: block; }
  .result { display: none; flex-direction: column; gap: 14px; animation: fadeUp 0.4s ease; }
  .result.active { display: flex; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 16px; position: relative; overflow: hidden; }
  .card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px; background: linear-gradient(90deg, transparent, rgba(0,230,118,0.3), transparent); }
  .verdict { border-radius: 12px; padding: 20px 16px; text-align: center; }
  .verdict.buy { background: linear-gradient(135deg, rgba(0,230,118,0.12), rgba(0,200,83,0.06)); border: 1px solid rgba(0,230,118,0.4); }
  .verdict.no-buy { background: linear-gradient(135deg, rgba(255,61,87,0.10), rgba(200,0,40,0.04)); border: 1px solid rgba(255,61,87,0.3); }
  .verdict.weak { background: linear-gradient(135deg, rgba(255,202,40,0.08), rgba(200,150,0,0.04)); border: 1px solid rgba(255,202,40,0.3); }
  .verdict-icon { font-size: 36px; line-height: 1; margin-bottom: 6px; }
  .verdict-label { font-family: var(--cond); font-size: 26px; font-weight: 900; letter-spacing: 3px; text-transform: uppercase; }
  .verdict.buy .verdict-label { color: var(--green); }
  .verdict.no-buy .verdict-label { color: var(--red); }
  .verdict.weak .verdict-label { color: var(--yellow); }
  .verdict-sub { font-family: var(--mono); font-size: 11px; color: var(--text-dim); margin-top: 4px; letter-spacing: 1px; }
  .price-row { display: flex; align-items: baseline; gap: 10px; margin-bottom: 4px; }
  .price-big { font-family: var(--mono); font-size: 34px; color: var(--cyan); text-shadow: 0 0 16px rgba(0,229,255,0.3); }
  .price-change { font-family: var(--mono); font-size: 15px; font-weight: 600; }
  .price-change.pos { color: var(--green); } .price-change.neg { color: var(--red); }
  .ticker-name { font-family: var(--cond); font-size: 13px; font-weight: 700; letter-spacing: 2px; color: var(--text-dim); text-transform: uppercase; margin-bottom: 12px; }
  .signal-section { margin-top: 4px; }
  .signal-label { display: flex; justify-content: space-between; font-family: var(--mono); font-size: 11px; color: var(--text-dim); letter-spacing: 1px; margin-bottom: 6px; text-transform: uppercase; }
  .signal-bar-track { height: 8px; background: var(--surface2); border-radius: 4px; overflow: hidden; }
  .signal-bar-fill { height: 100%; border-radius: 4px; transition: width 0.8s cubic-bezier(0.16,1,0.3,1); background: linear-gradient(90deg, var(--green-dim), var(--green)); box-shadow: 0 0 8px rgba(0,230,118,0.4); }
  .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .stat { background: var(--surface2); border-radius: 8px; padding: 10px 12px; }
  .stat-label { font-family: var(--mono); font-size: 9px; color: var(--text-dim); letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 4px; }
  .stat-value { font-family: var(--mono); font-size: 16px; color: var(--text); }
  .stat-value.green { color: var(--green); } .stat-value.red { color: var(--red); } .stat-value.cyan { color: var(--cyan); } .stat-value.yellow { color: var(--yellow); }
  .section-title { font-family: var(--cond); font-size: 12px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--text-dim); margin-bottom: 10px; }
  .step { display: flex; align-items: flex-start; gap: 10px; padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.04); }
  .step:last-child { border-bottom: none; padding-bottom: 0; }
  .step-body { flex: 1; }
  .step-name { font-family: var(--sans); font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 2px; }
  .step-detail { font-family: var(--mono); font-size: 11px; color: var(--text-dim); }
  .step-pts { font-family: var(--mono); font-size: 11px; font-weight: 700; padding: 2px 7px; border-radius: 4px; flex-shrink: 0; align-self: flex-start; margin-top: 2px; }
  .step-pts.earned { background: rgba(0,230,118,0.15); color: var(--green); }
  .step-pts.zero { background: rgba(255,255,255,0.04); color: var(--text-dim); }
  .trade-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; text-align: center; }
  .trade-label { font-family: var(--mono); font-size: 9px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--text-dim); margin-bottom: 5px; }
  .trade-value { font-family: var(--mono); font-size: 16px; font-weight: 700; }
  .trade-value.entry { color: var(--cyan); } .trade-value.stop { color: var(--red); } .trade-value.target { color: var(--green); }
  .news-item { padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.04); }
  .news-item:last-child { border-bottom: none; padding-bottom: 0; }
  .news-title { font-size: 13px; color: var(--text); text-decoration: none; display: block; line-height: 1.4; }
  .disq-item { padding: 8px 10px; background: rgba(255,61,87,0.07); border-radius: 6px; border-left: 3px solid var(--red); font-family: var(--mono); font-size: 12px; color: var(--red); margin-bottom: 6px; }
  .disclaimer { font-family: var(--mono); font-size: 10px; color: var(--text-dim); text-align: center; line-height: 1.6; padding: 8px 0; opacity: 0.6; }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div>
      <div class="logo">STOCK<span>SCAN</span></div>
      <div class="tagline">Penny Stock Screener</div>
    </div>
  </div>
  <div class="search-wrap">
    <input class="ticker-input" id="tickerInput" type="text" maxlength="6" placeholder="TICKER…" autocomplete="off" autocorrect="off" spellcheck="false"/>
    <button class="scan-btn" id="scanBtn" onclick="runScan()">SCAN</button>
  </div>
  <div class="loading" id="loading">
    <div class="spinner"></div>
    <div class="loading-text">SCANNING MARKET DATA…</div>
  </div>
  <div class="error-box" id="errorBox"></div>
  <div class="result" id="result">
    <div class="verdict" id="verdict">
      <div class="verdict-icon" id="verdictIcon"></div>
      <div class="verdict-label" id="verdictLabel"></div>
      <div class="verdict-sub" id="verdictSub"></div>
    </div>
    <div class="card">
      <div class="ticker-name" id="tickerDisplay"></div>
      <div class="price-row">
        <div class="price-big" id="priceDisplay"></div>
        <div class="price-change" id="priceChange"></div>
      </div>
      <div class="signal-section">
        <div class="signal-label"><span>SIGNAL STRENGTH</span><span id="signalScore"></span></div>
        <div class="signal-bar-track"><div class="signal-bar-fill" id="signalBar" style="width:0%"></div></div>
      </div>
    </div>
    <div class="card">
      <div class="section-title">Market Data</div>
      <div class="stats-grid" id="statsGrid"></div>
    </div>
    <div class="card">
      <div class="section-title">Signal Breakdown</div>
      <div id="stepsContainer"></div>
    </div>
    <div class="card" id="disqCard" style="display:none">
      <div class="section-title">⚠ Disqualifiers</div>
      <div id="disqContainer"></div>
    </div>
    <div class="card">
      <div class="section-title">Trade Parameters</div>
      <div class="trade-row" id="tradeRow"></div>
    </div>
    <div class="card" id="newsCard" style="display:none">
      <div class="section-title">Recent News</div>
      <div id="newsContainer"></div>
    </div>
    <div class="disclaimer">⚠ For educational purposes only.<br/>Not financial advice. Penny stocks carry extreme risk.</div>
  </div>
</div>

<script>
const MAX_PRICE=5,MIN_AVG_VOL=500000,MIN_MCAP=10000000,VOL_SPIKE=2.5,MIN_CHG=0.03,RSI_LO=40,RSI_HI=65,PUMP=0.5,SL=0.15,TP=0.3;
const $=id=>document.getElementById(id);
const fmtM=n=>n>=1e9?`$${(n/1e9).toFixed(1)}B`:n>=1e6?`$${(n/1e6).toFixed(1)}M`:n>0?`$${n.toLocaleString()}`:'N/A';

function calcRSI(c,p=14){
  if(c.length<p+1)return null;
  let g=[],l=[];
  for(let i=1;i<c.length;i++){const d=c[i]-c[i-1];g.push(Math.max(d,0));l.push(Math.max(-d,0));}
  const ag=g.slice(-p).reduce((a,b)=>a+b,0)/p;
  const al=l.slice(-p).reduce((a,b)=>a+b,0)/p;
  return al===0?100:Math.round(100-(100/(1+ag/al)));
}
function ma(arr,n){
  if(arr.length<n)return null;
  return parseFloat((arr.slice(-n).reduce((a,b)=>a+b,0)/n).toFixed(4));
}

// Try multiple proxies in order until one works
async function fetchWithProxy(url) {
  const proxies = [
    `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
    `https://corsproxy.io/?${encodeURIComponent(url)}`,
    `https://proxy.cors.sh/${url}`,
  ];
  for (const proxy of proxies) {
    try {
      const r = await fetch(proxy, { signal: AbortSignal.timeout(8000) });
      if (r.ok) return r;
    } catch {}
  }
  throw new Error('Could not connect to market data. Please try again.');
}

async function runScan(){
  const ticker=$('tickerInput').value.trim().toUpperCase();
  if(!ticker){$('tickerInput').focus();return;}
  $('result').classList.remove('active');
  $('errorBox').classList.remove('active');
  $('loading').classList.add('active');
  $('scanBtn').disabled=true;

  try {
    const chartUrl=`https://query1.finance.yahoo.com/v8/finance/chart/${ticker}?interval=1d&range=3mo`;
    const quoteUrl=`https://query1.finance.yahoo.com/v7/finance/quote?symbols=${ticker}`;

    const [chartRes, quoteRes] = await Promise.all([
      fetchWithProxy(chartUrl),
      fetchWithProxy(quoteUrl)
    ]);

    const chartJson = await chartRes.json();
    const quoteJson = await quoteRes.json().catch(()=>({quoteResponse:{result:[]}}));

    const result = chartJson?.chart?.result?.[0];
    if(!result) throw new Error(`No price data found for ${ticker}. Check the ticker symbol.`);

    const closes  = result.indicators.quote[0].close.filter(v=>v!=null);
    const volumes = result.indicators.quote[0].volume.filter(v=>v!=null);
    if(closes.length<2) throw new Error('Not enough price history for this ticker.');

    const quote    = quoteJson?.quoteResponse?.result?.[0] || {};
    const price    = parseFloat(closes[closes.length-1].toFixed(4));
    const prev     = closes[closes.length-2];
    const todayVol = volumes[volumes.length-1];
    const avgVol   = volumes.slice(-30).reduce((a,b)=>a+b,0)/Math.min(volumes.length,30);
    const volRatio = parseFloat((todayVol/avgVol).toFixed(2));
    const pchg     = (price-prev)/prev;
    const p5d      = closes.length>=6?closes[closes.length-6]:closes[0];
    const gain5d   = (price-p5d)/p5d;
    const rsi      = calcRSI(closes);
    const ma10     = ma(closes,10);
    const ma30v    = ma(closes,30);
    const mcap     = quote.marketCap||0;
    const bid      = quote.bid||0;
    const ask      = quote.ask||price;
    const spread   = ask>0?(ask-bid)/ask:0;

    const s1p=price<MAX_PRICE,s1v=avgVol>MIN_AVG_VOL,s1m=mcap>MIN_MCAP;
    const screen=s1p&&s1v&&s1m;
    const vspike=volRatio>=VOL_SPIKE,pup=pchg>=MIN_CHG,step2=vspike&&pup;
    const ama10=ma10?price>ma10:false,m1030=ma10&&ma30v?ma10>ma30v:false,rsiok=rsi?rsi>=RSI_LO&&rsi<=RSI_HI:false;
    const step3=ama10&&m1030&&rsiok;
    const spok=spread<=0.05,nopump=gain5d<=PUMP;
    const disq=[];
    if(!spok)disq.push(`Bid/ask spread too wide (${(spread*100).toFixed(1)}%)`);
    if(!nopump)disq.push(`Possible pump-and-dump (+${(gain5d*100).toFixed(0)}% in 5 days)`);

    let sig=0;
    if(screen){if(step2)sig+=2;if(step3)sig+=2;}

    let news=[];
    try{
      const rssUrl=`https://feeds.finance.yahoo.com/rss/2.0/headline?s=${ticker}&region=US&lang=en-US`;
      const rr=await fetchWithProxy(rssUrl);
      const txt=await rr.text();
      const xml=new DOMParser().parseFromString(txt,'text/xml');
      news=Array.from(xml.querySelectorAll('item')).slice(0,3).map(i=>({
        title:i.querySelector('title')?.textContent||'',
        url:i.querySelector('link')?.textContent||''
      }));
      if(news.length>0)sig+=3;
    }catch{}

    const buy=sig>=5&&disq.length===0&&screen;
    render({ticker,price,pchg,mcap,avgVol,todayVol,volRatio,rsi,ma10,ma30:ma30v,spread,gain5d,screen,step2,step3,vspike,pup,ama10,m1030,rsiok,spok,nopump,disq,sig,news,buy,
      trade:{entry:price,stop:parseFloat((price*(1-SL)).toFixed(4)),target:parseFloat((price*(1+TP)).toFixed(4))}});
    $('result').classList.add('active');
    $('result').scrollIntoView({behavior:'smooth',block:'start'});

  } catch(err){
    $('errorBox').textContent=`⚠ ${err.message}`;
    $('errorBox').classList.add('active');
  } finally {
    $('loading').classList.remove('active');
    $('scanBtn').disabled=false;
  }
}

function render(d){
  const v=$('verdict');v.className='verdict';
  if(d.buy){v.classList.add('buy');$('verdictIcon').textContent='★';$('verdictLabel').textContent='BUY SIGNAL';$('verdictSub').textContent=`${d.sig}/7 pts · All filters passed`;}
  else if(!d.screen){v.classList.add('no-buy');$('verdictIcon').textContent='✘';$('verdictLabel').textContent='NOT QUALIFIED';$('verdictSub').textContent='Failed initial penny stock screen';}
  else if(d.disq.length>0){v.classList.add('no-buy');$('verdictIcon').textContent='✘';$('verdictLabel').textContent='DISQUALIFIED';$('verdictSub').textContent=`${d.disq.length} risk flag(s) detected`;}
  else{v.classList.add('weak');$('verdictIcon').textContent='◎';$('verdictLabel').textContent='SIGNAL WEAK';$('verdictSub').textContent=`${d.sig}/7 pts · Need ≥5`;}

  $('tickerDisplay').textContent=d.ticker;
  $('priceDisplay').textContent=`$${d.price.toFixed(4)}`;
  const pc=$('priceChange');
  pc.textContent=`${d.pchg>=0?'+':''}${(d.pchg*100).toFixed(2)}%`;
  pc.className='price-change '+(d.pchg>=0?'pos':'neg');
  $('signalScore').textContent=`${d.sig} / 7 pts`;
  setTimeout(()=>{$('signalBar').style.width=Math.round((d.sig/7)*100)+'%';},50);

  $('statsGrid').innerHTML=[
    {l:'Market Cap',v:fmtM(d.mcap),c:''},
    {l:'RSI (14)',v:d.rsi??'N/A',c:d.rsi>=40&&d.rsi<=65?'green':d.rsi>65?'red':'yellow'},
    {l:'Vol Ratio',v:`${d.volRatio}x`,c:d.volRatio>=2.5?'green':''},
    {l:'5-Day Gain',v:`${d.gain5d>=0?'+':''}${(d.gain5d*100).toFixed(1)}%`,c:d.gain5d>0.5?'red':d.gain5d>0.1?'green':''},
    {l:'Spread',v:`${(d.spread*100).toFixed(2)}%`,c:d.spread>0.05?'red':'green'},
    {l:'Avg Vol 30D',v:`${(d.avgVol/1e6).toFixed(1)}M`,c:'cyan'},
  ].map(s=>`<div class="stat"><div class="stat-label">${s.l}</div><div class="stat-value ${s.c}">${s.v}</div></div>`).join('');

  const steps=[
    {name:'Initial Screen',detail:`Price $${d.price} · AvgVol ${(d.avgVol/1000).toFixed(0)}K`,passed:d.screen,pts:0},
    {name:'Volume Surge',detail:`${d.volRatio}x spike · ${(d.pchg*100).toFixed(2)}% move`,passed:d.step2,pts:2},
    {name:'Price Momentum',detail:`MA10=$${d.ma10??'N/A'} · MA30=$${d.ma30??'N/A'} · RSI=${d.rsi??'N/A'}`,passed:d.step3,pts:2},
    {name:'News Catalyst',detail:d.news.length>0?`${d.news.length} article(s) found`:'No recent news',passed:d.news.length>0,pts:3},
    {name:'Risk Filters',detail:d.disq.length===0?'No disqualifiers':d.disq.join('; '),passed:d.disq.length===0,pts:0},
  ];
  $('stepsContainer').innerHTML=steps.map(s=>`
    <div class="step">
      <div style="font-size:16px;flex-shrink:0;margin-top:1px">${s.passed?'✅':'❌'}</div>
      <div class="step-body"><div class="step-name">${s.name}</div><div class="step-detail">${s.detail}</div></div>
      ${s.pts>0?`<div class="step-pts ${s.passed?'earned':'zero'}">${s.passed?'+'+s.pts:'0'} pts</div>`:''}
    </div>`).join('');

  if(d.disq.length>0){$('disqCard').style.display='';$('disqContainer').innerHTML=d.disq.map(x=>`<div class="disq-item">⚠ ${x}</div>`).join('');}
  else $('disqCard').style.display='none';

  $('tradeRow').innerHTML=`
    <div><div class="trade-label">Entry</div><div class="trade-value entry">$${d.trade.entry.toFixed(4)}</div></div>
    <div><div class="trade-label">Stop Loss</div><div class="trade-value stop">$${d.trade.stop.toFixed(4)}</div></div>
    <div><div class="trade-label">Target</div><div class="trade-value target">$${d.trade.target.toFixed(4)}</div></div>`;

  if(d.news.length>0){
    $('newsCard').style.display='';
    $('newsContainer').innerHTML=d.news.map(n=>`<div class="news-item"><a class="news-title" href="${n.url}" target="_blank">${n.title}</a></div>`).join('');
  } else $('newsCard').style.display='none';
}

$('tickerInput').addEventListener('keydown',e=>{if(e.key==='Enter')runScan();});
</script>
</body>
</html>
