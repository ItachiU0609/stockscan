<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="StockScan"/>
<title>StockScan — Penny Stock Screener</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow:wght@300;400;600;700&family=Barlow+Condensed:wght@700;900&display=swap" rel="stylesheet"/>

<style>
  /* ── Reset & Base ── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #080c10;
    --surface:   #0d1520;
    --surface2:  #111d2e;
    --border:    rgba(0,200,120,0.15);
    --green:     #00e676;
    --green-dim: #00c853;
    --red:       #ff3d57;
    --yellow:    #ffca28;
    --cyan:      #00e5ff;
    --text:      #cdd9e5;
    --text-dim:  #5a7a8a;
    --mono:      'Share Tech Mono', monospace;
    --sans:      'Barlow', sans-serif;
    --cond:      'Barlow Condensed', sans-serif;
    --safe-top:  env(safe-area-inset-top, 0px);
    --safe-bot:  env(safe-area-inset-bottom, 0px);
  }

  html, body {
    min-height: 100dvh;
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-size: 15px;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }

  /* ── Scanline texture overlay ── */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.07) 2px,
      rgba(0,0,0,0.07) 4px
    );
    pointer-events: none;
    z-index: 9999;
  }

  /* ── Grid background ── */
  body::after {
    content: '';
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(0,200,120,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,200,120,0.03) 1px, transparent 1px);
    background-size: 32px 32px;
    pointer-events: none;
    z-index: 0;
  }

  .app {
    position: relative;
    z-index: 1;
    max-width: 480px;
    margin: 0 auto;
    padding: calc(var(--safe-top) + 16px) 16px calc(var(--safe-bot) + 24px);
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  /* ── Header ── */
  .header {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    padding: 8px 0 4px;
  }
  .logo {
    font-family: var(--cond);
    font-size: 32px;
    font-weight: 900;
    letter-spacing: 2px;
    color: var(--green);
    text-shadow: 0 0 20px rgba(0,230,118,0.4);
    line-height: 1;
  }
  .logo span { color: var(--cyan); }
  .tagline {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  /* ── Search ── */
  .search-wrap {
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .ticker-input {
    flex: 1;
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 8px;
    padding: 14px 16px;
    font-family: var(--mono);
    font-size: 20px;
    letter-spacing: 3px;
    color: var(--green);
    text-transform: uppercase;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    caret-color: var(--green);
  }
  .ticker-input::placeholder { color: var(--text-dim); letter-spacing: 2px; font-size: 14px; }
  .ticker-input:focus {
    border-color: var(--green);
    box-shadow: 0 0 0 3px rgba(0,230,118,0.12), 0 0 20px rgba(0,230,118,0.08);
  }
  .scan-btn {
    background: var(--green);
    color: #000;
    border: none;
    border-radius: 8px;
    padding: 14px 20px;
    font-family: var(--cond);
    font-weight: 700;
    font-size: 16px;
    letter-spacing: 1px;
    cursor: pointer;
    transition: transform 0.1s, box-shadow 0.2s;
    white-space: nowrap;
    -webkit-tap-highlight-color: transparent;
  }
  .scan-btn:active { transform: scale(0.96); }
  .scan-btn:disabled {
    background: #1a2a1a;
    color: var(--text-dim);
    cursor: not-allowed;
  }

  /* ── Loading ── */
  .loading {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    padding: 40px 0;
  }
  .loading.active { display: flex; }
  .spinner {
    width: 40px; height: 40px;
    border: 2px solid var(--border);
    border-top-color: var(--green);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text-dim);
    letter-spacing: 2px;
    animation: pulse 1.4s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100% { opacity: 0.4; } 50% { opacity: 1; } }

  /* ── Error ── */
  .error-box {
    display: none;
    background: rgba(255,61,87,0.08);
    border: 1px solid rgba(255,61,87,0.3);
    border-radius: 8px;
    padding: 14px 16px;
    font-family: var(--mono);
    font-size: 13px;
    color: var(--red);
  }
  .error-box.active { display: block; }

  /* ── Result Card ── */
  .result { display: none; flex-direction: column; gap: 14px; animation: fadeUp 0.4s ease; }
  .result.active { display: flex; }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    position: relative;
    overflow: hidden;
  }
  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(0,230,118,0.3), transparent);
  }

  /* ── Verdict banner ── */
  .verdict {
    border-radius: 12px;
    padding: 20px 16px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .verdict.buy {
    background: linear-gradient(135deg, rgba(0,230,118,0.12), rgba(0,200,83,0.06));
    border: 1px solid rgba(0,230,118,0.4);
  }
  .verdict.no-buy {
    background: linear-gradient(135deg, rgba(255,61,87,0.10), rgba(200,0,40,0.04));
    border: 1px solid rgba(255,61,87,0.3);
  }
  .verdict.weak {
    background: linear-gradient(135deg, rgba(255,202,40,0.08), rgba(200,150,0,0.04));
    border: 1px solid rgba(255,202,40,0.3);
  }
  .verdict-icon { font-size: 36px; line-height: 1; margin-bottom: 6px; }
  .verdict-label {
    font-family: var(--cond);
    font-size: 26px;
    font-weight: 900;
    letter-spacing: 3px;
    text-transform: uppercase;
  }
  .verdict.buy  .verdict-label { color: var(--green); }
  .verdict.no-buy .verdict-label { color: var(--red); }
  .verdict.weak .verdict-label { color: var(--yellow); }
  .verdict-sub {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-dim);
    margin-top: 4px;
    letter-spacing: 1px;
  }

  /* ── Price row ── */
  .price-row {
    display: flex;
    align-items: baseline;
    gap: 10px;
    margin-bottom: 4px;
  }
  .price-big {
    font-family: var(--mono);
    font-size: 34px;
    color: var(--cyan);
    text-shadow: 0 0 16px rgba(0,229,255,0.3);
  }
  .price-change {
    font-family: var(--mono);
    font-size: 15px;
    font-weight: 600;
  }
  .price-change.pos { color: var(--green); }
  .price-change.neg { color: var(--red); }
  .ticker-name {
    font-family: var(--cond);
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 2px;
    color: var(--text-dim);
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  /* ── Signal bar ── */
  .signal-section { margin-top: 4px; }
  .signal-label {
    display: flex;
    justify-content: space-between;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 1px;
    margin-bottom: 6px;
    text-transform: uppercase;
  }
  .signal-bar-track {
    height: 8px;
    background: var(--surface2);
    border-radius: 4px;
    overflow: hidden;
  }
  .signal-bar-fill {
    height: 100%;
    border-radius: 4px;
    transition: width 0.8s cubic-bezier(0.16,1,0.3,1);
    background: linear-gradient(90deg, var(--green-dim), var(--green));
    box-shadow: 0 0 8px rgba(0,230,118,0.4);
  }

  /* ── Stats grid ── */
  .stats-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }
  .stat {
    background: var(--surface2);
    border-radius: 8px;
    padding: 10px 12px;
  }
  .stat-label {
    font-family: var(--mono);
    font-size: 9px;
    color: var(--text-dim);
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-bottom: 4px;
  }
  .stat-value {
    font-family: var(--mono);
    font-size: 16px;
    color: var(--text);
  }
  .stat-value.green { color: var(--green); }
  .stat-value.red   { color: var(--red); }
  .stat-value.cyan  { color: var(--cyan); }
  .stat-value.yellow { color: var(--yellow); }

  /* ── Step checks ── */
  .section-title {
    font-family: var(--cond);
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 10px;
  }
  .step {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 10px 0;
    border-bottom: 1px solid rgba(255,255,255,0.04);
  }
  .step:last-child { border-bottom: none; padding-bottom: 0; }
  .step-icon {
    font-size: 16px;
    flex-shrink: 0;
    margin-top: 1px;
  }
  .step-body { flex: 1; }
  .step-name {
    font-family: var(--sans);
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 2px;
  }
  .step-detail {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 0.5px;
  }
  .step-pts {
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 700;
    padding: 2px 7px;
    border-radius: 4px;
    flex-shrink: 0;
    align-self: flex-start;
    margin-top: 2px;
  }
  .step-pts.earned { background: rgba(0,230,118,0.15); color: var(--green); }
  .step-pts.zero   { background: rgba(255,255,255,0.04); color: var(--text-dim); }

  /* ── Trade targets ── */
  .trade-row {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 8px;
    text-align: center;
  }
  .trade-item { }
  .trade-label {
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 5px;
  }
  .trade-value {
    font-family: var(--mono);
    font-size: 16px;
    font-weight: 700;
  }
  .trade-value.entry  { color: var(--cyan); }
  .trade-value.stop   { color: var(--red); }
  .trade-value.target { color: var(--green); }

  /* ── News ── */
  .news-item {
    padding: 10px 0;
    border-bottom: 1px solid rgba(255,255,255,0.04);
  }
  .news-item:last-child { border-bottom: none; padding-bottom: 0; }
  .news-title {
    font-size: 13px;
    font-weight: 400;
    color: var(--text);
    line-height: 1.4;
    text-decoration: none;
    display: block;
  }
  .news-title:hover { color: var(--cyan); }

  /* ── Disqualifiers ── */
  .disq-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 10px;
    background: rgba(255,61,87,0.07);
    border-radius: 6px;
    border-left: 3px solid var(--red);
    font-family: var(--mono);
    font-size: 12px;
    color: var(--red);
    margin-bottom: 6px;
  }

  /* ── Disclaimer ── */
  .disclaimer {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-dim);
    text-align: center;
    line-height: 1.6;
    padding: 8px 0;
    opacity: 0.6;
  }
</style>
</head>
<body>

<div class="app">

  <!-- Header -->
  <div class="header">
    <div>
      <div class="logo">STOCK<span>SCAN</span></div>
      <div class="tagline">Penny Stock Screener</div>
    </div>
  </div>

  <!-- Search -->
  <div class="search-wrap">
    <input
      class="ticker-input"
      id="tickerInput"
      type="text"
      maxlength="6"
      placeholder="TICKER…"
      autocomplete="off"
      autocorrect="off"
      spellcheck="false"
    />
    <button class="scan-btn" id="scanBtn" onclick="runScan()">SCAN</button>
  </div>

  <!-- Loading -->
  <div class="loading" id="loading">
    <div class="spinner"></div>
    <div class="loading-text">SCANNING MARKET DATA…</div>
  </div>

  <!-- Error -->
  <div class="error-box" id="errorBox"></div>

  <!-- Results -->
  <div class="result" id="result">

    <!-- Verdict -->
    <div class="verdict" id="verdict">
      <div class="verdict-icon" id="verdictIcon"></div>
      <div class="verdict-label" id="verdictLabel"></div>
      <div class="verdict-sub" id="verdictSub"></div>
    </div>

    <!-- Price Card -->
    <div class="card">
      <div class="ticker-name" id="tickerDisplay"></div>
      <div class="price-row">
        <div class="price-big" id="priceDisplay"></div>
        <div class="price-change" id="priceChange"></div>
      </div>

      <!-- Signal bar -->
      <div class="signal-section">
        <div class="signal-label">
          <span>SIGNAL STRENGTH</span>
          <span id="signalScore"></span>
        </div>
        <div class="signal-bar-track">
          <div class="signal-bar-fill" id="signalBar" style="width:0%"></div>
        </div>
      </div>
    </div>

    <!-- Stats -->
    <div class="card">
      <div class="section-title">Market Data</div>
      <div class="stats-grid" id="statsGrid"></div>
    </div>

    <!-- Steps -->
    <div class="card">
      <div class="section-title">Signal Breakdown</div>
      <div id="stepsContainer"></div>
    </div>

    <!-- Disqualifiers (shown only if any) -->
    <div class="card" id="disqCard" style="display:none">
      <div class="section-title">⚠ Disqualifiers</div>
      <div id="disqContainer"></div>
    </div>

    <!-- Trade Parameters -->
    <div class="card">
      <div class="section-title">Trade Parameters</div>
      <div class="trade-row" id="tradeRow"></div>
    </div>

    <!-- News -->
    <div class="card" id="newsCard" style="display:none">
      <div class="section-title">Recent News (7 days)</div>
      <div id="newsContainer"></div>
    </div>

    <!-- Disclaimer -->
    <div class="disclaimer">
      ⚠ For educational purposes only.<br/>
      Not financial advice. Penny stocks carry extreme risk.
    </div>

  </div><!-- /result -->
</div><!-- /app -->

<script>
// ── Config ──────────────────────────────────────────
// Change this to your deployed backend URL when hosted!
const API_BASE = window.location.origin;

// ── Helpers ─────────────────────────────────────────
const $ = id => document.getElementById(id);
const fmt = n => n == null ? 'N/A' : n.toLocaleString();
const fmtM = n => n >= 1e9 ? `$${(n/1e9).toFixed(1)}B` : n >= 1e6 ? `$${(n/1e6).toFixed(1)}M` : `$${n.toLocaleString()}`;

function setVisible(el, show) {
  if (typeof el === 'string') el = $(el);
  el.style.display = show ? '' : 'none';
}

// ── Scan ─────────────────────────────────────────────
async function runScan() {
  const ticker = $('tickerInput').value.trim().toUpperCase();
  if (!ticker) { $('tickerInput').focus(); return; }

  // Reset UI
  $('result').classList.remove('active');
  $('errorBox').classList.remove('active');
  $('loading').classList.add('active');
  $('scanBtn').disabled = true;

  try {
    const res = await fetch(`${API_BASE}/api/analyze/${ticker}`);
    const data = await res.json();

    if (!res.ok) throw new Error(data.detail || 'Unknown error');

    renderResult(data);
    $('result').classList.add('active');
    $('result').scrollIntoView({ behavior: 'smooth', block: 'start' });

  } catch (err) {
    $('errorBox').textContent = `⚠ ${err.message}`;
    $('errorBox').classList.add('active');
  } finally {
    $('loading').classList.remove('active');
    $('scanBtn').disabled = false;
  }
}

// ── Render ───────────────────────────────────────────
function renderResult(d) {
  const { ticker, price, price_change_pct, market_cap, avg_volume_30d,
          today_volume, volume_ratio, rsi, ma10, ma30, spread_pct,
          gain_5d_pct, steps, signal_strength, max_signal, buy_signal, trade } = d;

  // Verdict
  const verdict = $('verdict');
  verdict.className = 'verdict';
  if (buy_signal) {
    verdict.classList.add('buy');
    $('verdictIcon').textContent = '★';
    $('verdictLabel').textContent = 'BUY SIGNAL';
    $('verdictSub').textContent = `${signal_strength}/${max_signal} pts · All filters passed`;
  } else if (!steps.screen.passed) {
    verdict.classList.add('no-buy');
    $('verdictIcon').textContent = '✘';
    $('verdictLabel').textContent = 'NOT QUALIFIED';
    $('verdictSub').textContent = 'Failed initial penny stock screen';
  } else if (steps.risk.disqualifiers.length > 0) {
    verdict.classList.add('no-buy');
    $('verdictIcon').textContent = '✘';
    $('verdictLabel').textContent = 'DISQUALIFIED';
    $('verdictSub').textContent = `${steps.risk.disqualifiers.length} risk flag(s) detected`;
  } else {
    verdict.classList.add('weak');
    $('verdictIcon').textContent = '◎';
    $('verdictLabel').textContent = 'SIGNAL WEAK';
    $('verdictSub').textContent = `${signal_strength}/${max_signal} pts · Need ≥5`;
  }

  // Price
  $('tickerDisplay').textContent = ticker;
  $('priceDisplay').textContent = `$${price.toFixed(4)}`;
  const chg = $('priceChange');
  chg.textContent = `${price_change_pct > 0 ? '+' : ''}${price_change_pct}%`;
  chg.className = 'price-change ' + (price_change_pct >= 0 ? 'pos' : 'neg');

  // Signal bar
  const pct = Math.round((signal_strength / max_signal) * 100);
  $('signalScore').textContent = `${signal_strength} / ${max_signal} pts`;
  setTimeout(() => { $('signalBar').style.width = pct + '%'; }, 50);

  // Stats
  $('statsGrid').innerHTML = [
    { l: 'Market Cap',   v: fmtM(market_cap),           c: '' },
    { l: 'RSI (14)',     v: rsi ?? 'N/A',
      c: rsi >= 40 && rsi <= 65 ? 'green' : rsi > 65 ? 'red' : 'yellow' },
    { l: 'Vol Ratio',    v: `${volume_ratio}x`,
      c: volume_ratio >= 2.5 ? 'green' : '' },
    { l: '5-Day Gain',  v: `${gain_5d_pct > 0 ? '+' : ''}${gain_5d_pct}%`,
      c: gain_5d_pct > 50 ? 'red' : gain_5d_pct > 10 ? 'green' : '' },
    { l: 'Bid/Ask Spread', v: `${spread_pct}%`,
      c: spread_pct > 5 ? 'red' : 'green' },
    { l: 'Avg Vol 30D', v: (avg_volume_30d/1e6).toFixed(1)+'M', c: 'cyan' },
  ].map(s => `
    <div class="stat">
      <div class="stat-label">${s.l}</div>
      <div class="stat-value ${s.c}">${s.v}</div>
    </div>
  `).join('');

  // Steps
  const stepDefs = [
    {
      key: 'screen',
      name: 'Initial Screen',
      detail: `Price $${price.toFixed(4)} · Vol ${(avg_volume_30d/1e3).toFixed(0)}K avg`,
      pts: 0,
    },
    {
      key: 'volume_surge',
      name: 'Volume Surge',
      detail: `${volume_ratio}x spike · ${price_change_pct > 0 ? '+' : ''}${price_change_pct}% price move`,
      pts: 2,
    },
    {
      key: 'momentum',
      name: 'Price Momentum',
      detail: `MA10=$${ma10 ?? 'N/A'} · MA30=$${ma30 ?? 'N/A'} · RSI=${rsi ?? 'N/A'}`,
      pts: 2,
    },
    {
      key: 'catalyst',
      name: 'News Catalyst',
      detail: steps.catalyst.news.length > 0
        ? `${steps.catalyst.news.length} article(s) in last 7 days`
        : 'No recent news found',
      pts: 3,
    },
    {
      key: 'risk',
      name: 'Risk Filters',
      detail: steps.risk.passed ? 'No disqualifiers' : steps.risk.disqualifiers.join('; '),
      pts: 0,
    },
  ];

  $('stepsContainer').innerHTML = stepDefs.map(s => {
    const passed = steps[s.key].passed;
    const icon   = s.key === 'screen' || s.key === 'risk'
      ? (passed ? '✔' : '✘')
      : (passed ? '✔' : '✘');
    const iconColor = passed ? '🟢' : (s.key === 'risk' ? '🔴' : '🔴');
    const ptsLabel  = s.pts > 0 ? (passed ? `+${s.pts}` : `0`) : null;
    const ptsClass  = passed ? 'earned' : 'zero';
    return `
      <div class="step">
        <div class="step-icon">${passed ? '✅' : '❌'}</div>
        <div class="step-body">
          <div class="step-name">${s.name}</div>
          <div class="step-detail">${s.detail}</div>
        </div>
        ${s.pts > 0 ? `<div class="step-pts ${ptsClass}">${passed ? '+'+s.pts : '0'} pts</div>` : ''}
      </div>
    `;
  }).join('');

  // Disqualifiers
  const disqs = steps.risk.disqualifiers;
  if (disqs.length > 0) {
    $('disqCard').style.display = '';
    $('disqContainer').innerHTML = disqs.map(d =>
      `<div class="disq-item">⚠ ${d}</div>`
    ).join('');
  } else {
    $('disqCard').style.display = 'none';
  }

  // Trade params
  $('tradeRow').innerHTML = `
    <div class="trade-item">
      <div class="trade-label">Entry</div>
      <div class="trade-value entry">$${trade.entry.toFixed(4)}</div>
    </div>
    <div class="trade-item">
      <div class="trade-label">Stop Loss</div>
      <div class="trade-value stop">$${trade.stop_loss.toFixed(4)}</div>
    </div>
    <div class="trade-item">
      <div class="trade-label">Target</div>
      <div class="trade-value target">$${trade.take_profit.toFixed(4)}</div>
    </div>
  `;

  // News
  const news = steps.catalyst.news;
  if (news.length > 0) {
    $('newsCard').style.display = '';
    $('newsContainer').innerHTML = news.map(n => `
      <div class="news-item">
        <a class="news-title" href="${n.url}" target="_blank" rel="noopener">
          ${n.title}
        </a>
      </div>
    `).join('');
  } else {
    $('newsCard').style.display = 'none';
  }
}

// ── Keyboard shortcut ────────────────────────────────
document.getElementById('tickerInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') runScan();
});
</script>
</body>
</html>
